        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ
           ============================================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 84px;
            transition: background .3s, color .3s;
            letter-spacing: -0.01em;
        }
        #app {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        /* ============================================================
           ИКОНКИ
           ============================================================ */
        .icon {
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: -0.125em;
            flex-shrink: 0;
        }
        svg.icon {
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        svg.icon-fill {
            fill: currentColor;
            stroke: none;
            width: 1em;
            height: 1em;
            display: inline-block;
            vertical-align: -0.125em;
            flex-shrink: 0;
        }

        /* ============================================================
           НАВИГАЦИЯ
           ============================================================ */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--surface);
            border-top: 1px solid var(--border);
            transition: background .3s, border-color .3s;
        }
        .nav-inner {
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            height: 64px;
            align-items: center;
            padding: 0 6px;
        }
        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 14px;
            border-radius: var(--radius-xs);
            border: none;
            background: transparent;
            color: var(--text3);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            letter-spacing: 0;
        }
        .nav-btn svg {
            width: 21px;
            height: 21px;
            stroke: currentColor;
            stroke-width: 1.8;
        }
        .nav-btn.active {
            color: var(--accent);
        }
        .nav-btn.active svg {
            stroke-width: 2.1;
        }

        /* ============================================================
           ЗАГОЛОВКИ СТРАНИЦ
           ============================================================ */
        .page-header {
            padding: 26px 0 18px;
        }
        .page-header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .page-header p {
            font-size: 14px;
            color: var(--text2);
            margin-top: 3px;
        }

        /* ============================================================
           ПОЛЯ ВВОДА
           ============================================================ */
        input[type=text],
        input[type=time],
        input[type=date],
        input[type=number],
        textarea,
        select {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: inherit;
            color: var(--text);
            transition: border .15s, box-shadow .15s;
            outline: none;
        }
        input:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
        }
        label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        /* ============================================================
           КНОПКИ
           ============================================================ */
        .btn {
            padding: 12px 20px;
            border-radius: var(--radius-sm);
            border: none;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            letter-spacing: -0.01em;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:active {
            transform: scale(.97);
            opacity: .92;
        }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            transition: all .15s;
            flex-shrink: 0;
        }
        .btn-icon svg {
            width: 15px;
            height: 15px;
        }
        .btn-icon:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }
        .btn-icon.danger:hover {
            background: rgba(239, 68, 68, .1);
            color: var(--danger);
        }
        .btn-icon.edit:hover {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* ============================================================
           TOAST-УВЕДОМЛЕНИЯ
           ============================================================ */
        #toast {
            position: fixed;
            bottom: 88px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: var(--text);
            color: var(--surface);
            padding: 10px 18px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            z-index: 300;
            opacity: 0;
            transition: all .2s;
            white-space: nowrap;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #toast svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
        }

        /* ============================================================
           МОДАЛЬНЫЕ ОКНА
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 16, .55);
            z-index: 150;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal-box {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: 22px 22px 0 0;
            padding: 22px;
            animation: slideUp .22s cubic-bezier(.4, 0, .2, 1);
            max-height: 90vh;
            overflow-y: auto;
        }
        @media(min-width:520px) {
            .modal-box {
                border-radius: 22px;
                margin: 24px;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(36px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 18px;
        }

        /* ============================================================
           ПРИВЕТСТВЕННАЯ КАРТОЧКА
           ============================================================ */
        .greeting-card {
            background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
            color: #fff;
            border-radius: var(--radius);
            padding: 22px;
            margin-bottom: 14px;
            position: relative;
            overflow: hidden;
            transition: background .3s;
        }
        .greeting-card::after {
            content: '';
            position: absolute;
            top: -36px;
            right: -36px;
            width: 130px;
            height: 130px;
            background: rgba(255, 255, 255, .07);
            border-radius: 50%;
        }
        .greeting-icon {
            width: 18px;
            height: 18px;
            opacity: .85;
        }
        .greeting-text {
            font-size: 13px;
            font-weight: 500;
            opacity: .85;
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .greeting-name {
            font-size: 25px;
            font-weight: 700;
            margin-top: 5px;
            position: relative;
            letter-spacing: -0.02em;
        }
        .greeting-date {
            font-size: 12.5px;
            opacity: .78;
            margin-top: 6px;
            position: relative;
        }

        /* ============================================================
           СТАТИСТИКА
           ============================================================ */
        .stat-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }
        .stat-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 18px;
            text-align: center;
        }
        .stat-num {
            font-size: 30px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
            letter-spacing: -0.02em;
        }
        .stat-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text2);
            margin-top: 5px;
        }

        /* ============================================================
           ПРОГРЕСС

        let state = {

        // 3. КОНСТАНТЫ
        // ============================================================
        const COLORS = ['#4f6ef7', '#7c3aed', '#ef4444', '#f97316', '#22c55e', '#eab308', '#ec4899'];
        const REC_LABELS = { none: '', daily: 'Каждый день', weekly: 'Каждую неделю', monthly: 'Каждый месяц',
            yearly: 'Каждый год' };

        ];

        const QUOTES = [
            'Каждый день — шанс стать лучше, чем вчера.',
            'Маленькие шаги ведут к большим победам.',

        ];

        // ============================================================
        // ВСТРОЕННЫЕ ЗВУКИ БУДИЛЬНИКА
        // Браузер не даёт доступ к системным рингтонам устройства —
        // такого API не существует ни в одном браузере. Поэтому здесь
        // несколько готовых мелодий, синтезированных через Web Audio,
        // плюс возможность загрузить свой аудиофайл с устройства.
        // ============================================================
        const ALARM_SOUNDS = [
            { id: 'classic', label: 'Классический' },
            { id: 'gentle', label: 'Мягкий' },
            { id: 'digital', label: 'Цифровой' },
            { id: 'pulse', label: 'Пульс' },
            { id: 'siren', label: 'Сирена' },
        ];

        let _audioCtx = null;
        function getAudioCtx() {
            if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (_audioCtx.state === 'suspended') _audioCtx.resume();
            return _audioCtx;
        }

        function beep(ctx, freq, start, dur, type, vol) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = type || 'sine';
            osc.frequency.value = freq;
            gain.gain.value = vol == null ? 0.3 : vol;
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(start);
            osc.stop(start + dur);
        }

        const SOUND_PATTERNS = {
            classic: (ctx, t) => { beep(ctx, 880, t, .15, 'sine', .3); beep(ctx, 880, t + .25, .15, 'sine', .3); },
            gentle: (ctx, t) => { beep(ctx, 523, t, .3, 'sine', .22); beep(ctx, 659, t + .3, .3, 'sine', .22); beep(ctx, 784, t + .6, .35, 'sine', .22); },
            digital: (ctx, t) => { beep(ctx, 1000, t, .08, 'square', .25); beep(ctx, 1000, t + .12, .08, 'square', .25); beep(ctx, 1000, t + .24, .08, 'square', .25); },
            pulse: (ctx, t) => { for (let i = 0; i < 4; i++) beep(ctx, 700, t + i * .15, .08, 'square', .28); },
            siren: (ctx, t) => {
                const osc = ctx.createOscillator(), gain = ctx.createGain();
                osc.type = 'sawtooth';
                gain.gain.value = .22;
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.linearRampToValueAtTime(900, t + .5);
                osc.frequency.linearRampToValueAtTime(400, t + 1);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(t);
                osc.stop(t + 1);
            },
        };
        const SOUND_DURATIONS = { classic: .8, gentle: 1.3, digital: .6, pulse: .9, siren: 1.1 };

        function playBuiltinOnce(id) {
            const ctx = getAudioCtx();
            (SOUND_PATTERNS[id] || SOUND_PATTERNS.classic)(ctx, ctx.currentTime);
        }

        function previewSound(sound) {
            if (sound && sound.type === 'custom' && sound.dataUrl) {
                const a = new Audio(sound.dataUrl);
                a.play().catch(() => toast('Не удалось воспроизвести файл'));
            } else {
                playBuiltinOnce((sound && sound.id) || 'classic');
            }
        }

        let _ringState = null;

        function startRinging(alarm) {
            stopRinging();
            const sound = alarm.sound || { type: 'builtin', id: 'classic' };
            if (sound.type === 'custom' && sound.dataUrl) {
                const audioEl = new Audio(sound.dataUrl);
                audioEl.loop = true;
                audioEl.play().catch(() => {});
                _ringState = { audioEl };
            } else {
                const id = sound.id || 'classic';
                const dur = SOUND_DURATIONS[id] || 1;
                playBuiltinOnce(id);
                const intervalId = setInterval(() => playBuiltinOnce(id), (dur + .4) * 1000);
                _ringState = { intervalId };
            }
            if (alarm.vibration && navigator.vibrate) {
                navigator.vibrate([500, 200, 500, 200, 500]);
                _ringState.vibrateInterval = setInterval(() => navigator.vibrate([500, 200, 500, 200, 500]), 2200);
            }
        }

        function stopRinging() {
            if (!_ringState) return;
            if (_ringState.intervalId) clearInterval(_ringState.intervalId);
            if (_ringState.vibrateInterval) clearInterval(_ringState.vibrateInterval);
            if (_ringState.audioEl) { _ringState.audioEl.pause(); _ringState.audioEl.currentTime = 0; }
            if (navigator.vibrate) navigator.vibrate(0);
            _ringState = null;
        }

            alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            emptyCheck: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            emptyCal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
            emptyBell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>',
            back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>',
            chevronL: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
            chevronR: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
            dots: '<svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>',
            repeat: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>',
            play: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"/></svg>',
        };

        function icon(name, cls) {
            return (ICONS[name] || '').replace('<svg ', `<svg class="${cls || 'icon'}" `);
        }

        function genId() {
            return Math.random().toString(36).slice(2) + Date.now();
        }

        // ============================================================
        // 5. Экранирование HTML
        // ============================================================
        function esc(s) {
            return String(s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' } [c]));
        }

        // ============================================================
        // 6. СОХРАНЕНИЕ И ЗАГРУЗКА ДАННЫХ
        // ============================================================
        function load() {
            try {
                const s = JSON.parse(localStorage.getItem('flowday') || '{}');
                if (s.userName !== undefined) state.userName = s.userName;
                if (s.dark !== undefined) state.dark = s.dark;
                if (s.color) state.color = s.color;
                if (s.tasks) state.tasks = s.tasks;
                if (s.events) state.events = s.events;
                if (s.alarms) state.alarms = s.alarms;
            } catch (e) {}

            // Если ничего не загрузилось — оставляем пустые массивы и пустое имя
            if (!state.userName) state.userName = '';
            if (!state.tasks) state.tasks = [];
            if (!state.events) state.events = [];
            if (!state.alarms) state.alarms = [];

            applyTheme();
        }

        function save() {
            localStorage.setItem('flowday', JSON.stringify({
                userName: state.userName,
                dark: state.dark,
                color: state.color,
                tasks: state.tasks,
                events: state.events,
                alarms: state.alarms,
            }));
        }

        function applyTheme() {
            document.documentElement.setAttribute('data-color', state.color);
            document.documentElement.classList.toggle('dark', state.dark);
        }

        // ============================================================
        // 7. УВЕДОМЛЕНИЯ (TOAST)
        // ============================================================
        let _tt;

        function toast(msg, iconSvg) {
            const el = document.getElementById('toast');
            el.innerHTML = (iconSvg ? iconSvg : '') + '<span>' + esc(msg) + '</span>';
            el.classList.add('show');
            clearTimeout(_tt);
            _tt = setTimeout(() => el.classList.remove('show'), 2500);
        }

        // ============================================================
        // 8. НАВИГАЦИЯ
        // ============================================================
        function goTo(page) {
            state.page = page;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page === page));
            render();
        }

        function render() {
            document.getElementById('app').innerHTML = renderPage();
            bindEvents();
        }

        // ============================================================
        // 9. ОТРИСОВКА СТРАНИЦ
        // ============================================================
        function renderPage() {
            if (state.page === 'today') return renderToday();
            if (state.page === 'planner') return renderPlanner();
            if (state.page === 'alarms') return renderAlarms();
            if (state.page === 'settings') return renderSettings();
            return '';
        }

        // ---------- СТРАНИЦА "СЕГОДНЯ" ----------
        function renderToday() {
            const now = new Date(),
                h = now.getHours();
            const gr = h < 6 ? 'Доброй ночи' : h < 12 ? 'Доброе утро' : h < 18 ? 'Добрый день' : 'Добрый вечер';
            const emIcon = h < 6 ? ICONS.moon : h < 12 ? ICONS.sunrise : h < 18 ? ICONS.cloudSun : ICONS.moon;
            const ds = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
            const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
            const total = state.tasks.length,
                done = state.tasks.filter(t => t.done).length;
            const pct = total ? Math.round(done / total * 100) : 0;
            const todayEvs = state.events.filter(ev => {
                const d = new Date(ev.startDate);
                if (ev.recurrence === 'daily') return true;
                if (ev.recurrence === 'weekly') return d.getDay() === now.getDay();
                if (ev.recurrence === 'monthly') return d.getDate() === now.getDate();
                if (ev.recurrence === 'yearly') return d.getDate() === now.getDate() && d.getMonth() === now.getMonth();
                return d.toDateString() === now.toDateString();
            });
            const nextAlarm = state.alarms.filter(a => a.on).sort((a, b) => a.time.localeCompare(b.time))[0];

            return `<div style="padding:0 0 8px">
                <div class="greeting-card">
                    <div class="greeting-text">${icon(emIcon === ICONS.moon ? 'moon' : emIcon === ICONS.sunrise ? 'sunrise' : 'cloudSun','greeting-icon')} ${gr}</div>
                    <div class="greeting-name">${state.userName ? esc(state.userName) : ''}</div>
                    <div class="greeting-date">${cap(ds)}</div>
                </div>
                <div class="stat-row">
                    <div class="stat-card"><div class="stat-num" id="statDoneNum">${done}/${total}</div><div class="stat-label">Задач выполнено</div></div>
                    <div class="stat-card"><div class="stat-num" style="color:var(--accent2)">${todayEvs.length}</div><div class="stat-label">Событий сегодня</div></div>
                </div>
                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                        <span class="section-title">Прогресс дня</span><span class="badge" id="todayProgressBadge">${pct}%</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="todayProgressFill" style="width:${pct}%"></div></div>
                </div>
                ${nextAlarm ? `<div class="card" style="padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
                    <div style="width:38px;height:38px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0">${icon('bell')}</div>
                    <div><div style="font-size:11.5px;color:var(--text2);font-weight:500">Следующий будильник</div>
                    <div style="font-size:19px;font-weight:700;letter-spacing:-0.02em">${nextAlarm.time} <span style="font-size:13.5px;font-weight:500;color:var(--text2)">${esc(nextAlarm.label)}</span></div></div>
                </div>` : ''}
                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="section-header"><span class="section-title">Задачи</span><span class="badge" id="taskTotalBadge">${total}</span></div>
                    <div class="space-y-2" id="taskListContainer">
                        ${state.tasks.map(t => `<div class="task-item${t.done ? ' done' : ''}">
                            <div class="task-checkbox${t.done ? ' checked' : ''}" onclick="toggleTask('${t.id}')">${t.done ? icon('check') : ''}</div>
                            <span class="task-text">${esc(t.text)}</span>
                            <button class="btn-icon edit" onclick="openEditTask('${t.id}')">${icon('edit')}</button>
                            <button class="btn-icon danger" onclick="deleteTask('${t.id}')">${icon('trash')}</button>
                        </div>`).join('') || `<div class="empty-state">${icon('emptyCheck')}<div>Нет задач. Добавьте первую!</div></div>`}
                    </div>
                    <div class="add-row mt-3">
                        <input type="text" id="newTask" placeholder="Добавить задачу..." onkeydown="if(event.key==='Enter')addTask()">
                        <button class="btn btn-primary" onclick="addTask()" style="white-space:nowrap;padding:12px 16px;display:flex;align-items:center">${icon('plus')}</button>
                    </div>
                </div>
                ${todayEvs.length ? `<div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="section-header mb-3"><span class="section-title">События сегодня</span></div>
                    <div class="space-y-2">${todayEvs.map(ev => `<div class="event-item">
                        <div class="event-dot" style="background:${ev.color}"></div>
                        <div class="event-name">${esc(ev.name)}</div>
                        ${ev.evTime ? `<span style="font-size:12px;color:var(--text2)">${ev.evTime}</span>` : ''}
                    </div>`).join('')}</div></div>` : ''}
                <div class="card" style="padding:16px;margin-bottom:8px">
                    <button class="btn btn-ghost w-full" onclick="newQuote()" style="display:flex;align-items:center;justify-content:center;gap:8px">${icon('sparkle')} Цитата дня</button>
                    <div id="quoteBox" style="display:none" class="mt-3 quote-box"></div>
                </div>
            </div>`;
        }

        // ---------- СТРАНИЦА "ПЛАНЕР" ----------
        function renderPlanner() {
            const year = state.calYear,
                month = state.calMonth;
            const mn = new Date(year, month, 1).toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
            const firstDow = (new Date(year, month, 1).getDay() + 6) % 7;
            const dim = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            let ch = '';
            for (let i = 0; i < firstDow; i++) ch += '<div class="cal-day"></div>';
            for (let d = 1; d <= dim; d++) {
                const dow = new Date(year, month, d).getDay();
                const isTod = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
                const isWe = dow === 0 || dow === 6;
                const evs = state.events.filter(ev => {
                    const ed = new Date(ev.startDate);
                    if (ev.recurrence === 'daily') return true;
                    if (ev.recurrence === 'weekly') return ed.getDay() === dow;
                    if (ev.recurrence === 'monthly') return ed.getDate() === d;
                    if (ev.recurrence === 'yearly') return ed.getDate() === d && ed.getMonth() === month;
                    return ed.getDate() === d && ed.getMonth() === month && ed.getFullYear() === year;
                });
                const dots = evs.length ? `<div class="cal-dots">${evs.slice(0, 3).map(e => `<div class="cal-dot" style="background:${e.color}"></div>`).join('')}</div>` :
                    '';
                ch +=
                    `<div class="cal-day${isTod ? ' today' : ''}${isWe && !isTod ? ' weekend' : ''}" onclick="openEventModal(${year},${month},${d})">${d}${dots}</div>`;
            }
            const all = [
                ...state.tasks.map(t => ({ type: 'task', name: t.text, id: t.id, date: '', done: t.done })),
                ...state.events.map(e => ({ type: 'event', name: e.name, id: e.id, date: e.startDate, color: e.color,
                    rec: e.recurrence }))
            ].sort((a, b) => (a.date || '9999').localeCompare(b.date || '9999'));

            return `<div style="padding:0 0 8px">
                <div class="page-header"><h1>Планер</h1><p>Управляй своим расписанием</p></div>
                <div class="card" style="margin-bottom:14px">
                    <div class="cal-header">
                        <button class="cal-nav" onclick="prevMonth()">${icon('chevronL')}</button>
                        <span class="cal-month">${mn.charAt(0).toUpperCase() + mn.slice(1)}</span>
                        <button class="cal-nav" onclick="nextMonth()">${icon('chevronR')}</button>
                    </div>
                    <div style="padding:0 12px">
                        <div class="cal-grid">
                            ${['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d => `<div class="cal-dow">${d}</div>`).join('')}
                            ${ch}
                        </div>
                    </div>
                    <div style="padding:10px 16px 14px;display:flex;gap:14px;font-size:11px;color:var(--text2);align-items:center">
                        <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block"></span> Выходные</span>
                        <span style="background:var(--accent);color:white;border-radius:4px;padding:1px 6px">Сегодня</span>
                        <span style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block"></span> Событие</span>
                    </div>
                </div>
                <button class="add-btn-dashed" style="margin-bottom:14px" onclick="openEventModalToday()">
                    ${icon('plus')} Новое событие
                </button>
                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="section-header mb-3"><span class="section-title">Все задачи и события</span><span class="badge">${all.length}</span></div>
                    <div class="space-y-2">${all.length ? all.map(item => `<div class="event-item">
                        ${item.type === 'event' ? `<div class="event-dot" style="background:${item.color}"></div>` : `<div class="task-checkbox${item.done ? ' checked' : ''}" style="cursor:default">${item.done ? icon('check') : ''}</div>`}
                        <div style="flex:1">
                            <div class="event-name${item.done ? ' text-muted' : ''}" style="${item.done ? 'text-decoration:line-through' : ''}">${esc(item.name)}</div>
                            ${item.date ? `<div class="event-date">${new Date(item.date).toLocaleDateString('ru-RU')}</div>` : ''}
                            ${item.rec && item.rec !== 'none' ? `<span class="event-rec">${REC_LABELS[item.rec]}</span>` : ''}
                        </div>
                        ${item.type === 'task' ? `<button class="btn-icon edit" onclick="openEditTask('${item.id}')">${icon('edit')}</button>` : ''}
                        ${item.type === 'event' ? `<button class="btn-icon danger" onclick="deleteEvent('${item.id}')">${icon('trash')}</button>` : `<button class="btn-icon danger" onclick="deleteTask('${item.id}')">${icon('trash')}</button>`}
                    </div>`).join('') : `<div class="empty-state">${icon('emptyCal')}<div>Нет задач и событий</div></div>`}</div>
                </div>
            </div>`;
        }

        // ---------- СТРАНИЦА "БУДИЛЬНИКИ" ----------
        function renderAlarms() {
            const activeCount = state.alarms.filter(a => a.on).length;
            const sorted = [...state.alarms].sort((a, b) => a.time.localeCompare(b.time));

            return `<div style="padding:0 0 8px">
                <div class="page-header"><h1>Будильники</h1><p>${activeCount} ${pluralAlarm(activeCount)} активно</p></div>

                ${sorted.length ? sorted.map(a => {
                    const daysLabel = alarmDaysLabel(a);
                    return `<div class="alarm-list-item${a.on ? '' : ' disabled'}">
                        <div class="alarm-list-time">${a.time}</div>
                        <div class="alarm-list-info">
                            <div class="alarm-list-label">${esc(a.label || 'Будильник')}</div>
                            <div class="alarm-list-sched">${daysLabel} · ${esc(alarmSoundLabel(a))}${a.vibration ? ` · ${icon('vibration')}` : ''}</div>
                        </div>
                        <div class="alarm-list-actions">
                            <button class="toggle${a.on ? ' on' : ''}" onclick="toggleAlarmOn('${a.id}')"></button>
                            <button class="btn-icon edit" onclick="openAlarmModal('${a.id}')">${icon('edit')}</button>
                            <button class="btn-icon danger" onclick="deleteAlarm('${a.id}')">${icon('trash')}</button>
                        </div>
                    </div>`;
                }).join('') : `<div class="empty-state">${icon('emptyBell')}<div>Будильников пока нет</div></div>`}

                <button class="add-btn-dashed mt-2" onclick="openAlarmModal(null)">
                    ${icon('plus')} Добавить будильник
                </button>

                <div class="card" style="padding:16px;margin-top:16px">
                    <div class="section-title mb-3">Мотивация</div>
                    <div class="quote-box" id="randomQuote">${icon('sparkle')}<span>${QUOTES[Math.floor(Math.random() * QUOTES.length)]}</span></div>
                    <button class="btn btn-ghost w-full mt-3" onclick="refreshQuote()" style="display:flex;align-items:center;justify-content:center;gap:8px">${icon('repeat')} Другая цитата</button>
                </div>
            </div>`;
        }

        function pluralAlarm(n) {
            const m = n % 100;
            if (m >= 11 && m <= 14) return 'будильников';
            const l = n % 10;
            if (l === 1) return 'будильник';
            if (l >= 2 && l <= 4) return 'будильника';
            return 'будильников';
        }

        function alarmDaysLabel(a) {
            if (!a.days || a.days.length === 7) return 'Каждый день';
            if (a.days.length === 0) return 'Без повтора';
            if (a.days.length === 5 && [0, 1, 2, 3, 4].every(d => a.days.includes(d))) return 'По будням (5/2)';
            if (a.days.length === 2 && a.days.includes(5) && a.days.includes(6)) return 'По выходным';
            if (a.days.length === 4 && [0, 1, 4, 5].every(d => a.days.includes(d))) return '2/2';
            if (a.days.length === 5 && [0, 1, 2, 5, 6].every(d => a.days.includes(d))) return '3/3';
            return a.days.sort((x, y) => x - y).map(d => WEEKDAYS[d]).join(', ');
        }

        function alarmSoundLabel(a) {
            const s = a.sound;
            if (!s) return ALARM_SOUNDS[0].label;
            if (s.type === 'custom') return s.name || 'Свой файл';
            const def = ALARM_SOUNDS.find(x => x.id === s.id);
            return def ? def.label : ALARM_SOUNDS[0].label;
        }

                // ---------- СТРАНИЦА "НАСТРОЙКИ" ----------
        function renderSettings() {
            return `<div style="padding:0 0 8px">
                <div class="page-header"><h1>Настройки</h1><p>Персонализация</p></div>

                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="settings-section-title" style="margin-bottom:12px">Профиль</div>
                    <div><label>Ваше имя</label><input type="text" id="nameInput" value="${esc(state.userName)}" oninput="updateName(this.value)" placeholder="Введите ваше имя"></div>
                </div>

                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="settings-section-title" style="margin-bottom:12px">Внешний вид</div>

                    <div class="setting-row" style="padding-bottom:16px;margin-bottom:16px">
                        <div style="display:flex;align-items:center;gap:10px">
                            <div style="width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0">${icon(state.dark ? 'moon' : 'sun')}</div>
                            <div class="setting-label">${state.dark ? 'Тёмная тема' : 'Светлая тема'}</div>
                        </div>
                        <button class="toggle${state.dark ? ' on' : ''}" onclick="toggleTheme()"></button>
                    </div>

                    <div class="setting-label" style="font-weight:600;margin-bottom:12px">Цвета</div>
                    <div class="color-pick-row">
                        ${Object.entries(THEMES).map(([key, t]) => `
                            <div class="color-circle${state.color === key ? ' sel' : ''}" style="background:linear-gradient(135deg,${t.swatchA},${t.swatchB})" onclick="setColor('${key}')" title="${t.label}"></div>`).join('')}
                    </div>
                </div>

                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="settings-section-title" style="margin-bottom:4px">Статистика</div>
                    <div class="setting-row"><div class="setting-label">Задач создано</div><span class="badge">${state.tasks.length}</span></div>
                    <div class="setting-row"><div class="setting-label">Событий создано</div><span class="badge">${state.events.length}</span></div>
                    <div class="setting-row"><div class="setting-label">Выполнено задач</div><span class="badge" style="background:var(--success);color:white">${state.tasks.filter(t => t.done).length}</span></div>
                </div>

                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="settings-section-title" style="margin-bottom:4px">Уведомления</div>
                    <div class="setting-row">
                        <div><div class="setting-label">Push-уведомления</div><div class="setting-desc">Напоминания о будильнике</div></div>
                        <button class="btn btn-ghost" onclick="reqNotifs()" style="font-size:13px;padding:8px 12px">Разрешить</button>
                    </div>
                </div>

                <div class="card" style="padding:16px;margin-bottom:14px">
                    <div class="settings-section-title" style="margin-bottom:4px">Резервная копия</div>
                    <div class="setting-row">
                        <div><div class="setting-label">Сохранить бэкап</div><div class="setting-desc">Скачать все данные в файл</div></div>
                        <button class="btn btn-ghost" onclick="exportBackup()" style="font-size:13px;padding:8px 12px;display:flex;align-items:center;gap:6px">${icon('download')} Скачать</button>
                    </div>
                    <div class="setting-row">
                        <div><div class="setting-label">Восстановить из бэкапа</div><div class="setting-desc">Загрузить данные из файла</div></div>
                        <button class="btn btn-ghost" onclick="document.getElementById('backupFileInput').click()" style="font-size:13px;padding:8px 12px;display:flex;align-items:center;gap:6px">${icon('upload')} Загрузить</button>
                    </div>
                    <input type="file" id="backupFileInput" accept="application/json" style="display:none" onchange="importBackup(this.files[0])">
                </div>

                <button class="btn btn-ghost w-full" onclick="clearData()" style="color:var(--danger);border-color:var(--danger);opacity:.8;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px">${icon('trash')} Очистить все данные</button>
            </div>`;
        }

        // ============================================================
        // 10. УПРАВЛЕНИЕ ТЕМОЙ ОФОРМЛЕНИЯ
        // ============================================================
        function toggleTheme() {
            state.dark = !state.dark;
            applyTheme();
            save();
            render();
        }

        function setColor(col) {
            state.color = col;
            applyTheme();
            save();
            render();
        }

        // ============================================================
        // 11. РАБОТА С ЗАДАЧАМИ
        // ============================================================
        let _editingTaskId = null;

        function toggleTask(id) {
            const t = state.tasks.find(t => t.id === id);
            if (t) {
                t.done = !t.done;
                save();
                toast(t.done ? 'Выполнено!' : 'Возвращено', icon(t.done ? 'check' : 'back'));
                updateTaskListUI();
            }
        }

        function addTask() {
            const inp = document.getElementById('newTask');
            const v = inp?.value.trim();
            if (!v) {
                toast('Введите текст задачи');
                return;
            }
            state.tasks.push({ id: genId(), text: v, done: false });
            save();
            updateTaskListUI();
            inp.value = '';
            toast('Задача добавлена', icon('plus'));
        }

        function deleteTask(id) {
            const t = state.tasks.find(t => t.id === id);
            askConfirm(`Удалить задачу «${t ? t.text : ''}»? Это действие нельзя отменить.`, () => {
                state.tasks = state.tasks.filter(t => t.id !== id);
                save();
                if (state.page === 'today') updateTaskListUI();
                else render();
                toast('Задача удалена', icon('trash'));
            });
        }

        function openEditTask(id) {
            const t = state.tasks.find(t => t.id === id);
            if (!t) return;
            _editingTaskId = id;
            document.getElementById('editTaskInput').value = t.text;
            document.getElementById('editTaskModal').classList.add('open');
            setTimeout(() => document.getElementById('editTaskInput').focus(), 100);
        }

        function closeEditTask() {
            document.getElementById('editTaskModal').classList.remove('open');
            _editingTaskId = null;
        }

        function saveEditTask() {
            const v = document.getElementById('editTaskInput').value.trim();
            if (!v) {
                toast('Текст не может быть пустым');
                return;
            }
            const t = state.tasks.find(t => t.id === _editingTaskId);
            if (t) {
                t.text = v;
                save();
            }
            closeEditTask();
            if (state.page === 'today') updateTaskListUI();
            else render();
            toast('Задача изменена', icon('edit'));
        }

        function updateTaskListUI() {
            const container = document.getElementById('taskListContainer');
            const totalBadge = document.getElementById('taskTotalBadge');
            const progressFill = document.getElementById('todayProgressFill');
            const progressBadge = document.getElementById('todayProgressBadge');
            const statDone = document.getElementById('statDoneNum');
            if (!container) { render(); return; }

            container.innerHTML = state.tasks.map(t => `
                <div class="task-item${t.done ? ' done' : ''}">
                    <div class="task-checkbox${t.done ? ' checked' : ''}" onclick="toggleTask('${t.id}')">${t.done ? icon('check') : ''}</div>
                    <span class="task-text">${esc(t.text)}</span>
                    <button class="btn-icon edit" onclick="openEditTask('${t.id}')">${icon('edit')}</button>
                    <button class="btn-icon danger" onclick="deleteTask('${t.id}')">${icon('trash')}</button>
                </div>`).join('') || `<div class="empty-state">${icon('emptyCheck')}<div>Нет задач. Добавьте первую!</div></div>`;

            const total = state.tasks.length,
                done = state.tasks.filter(t => t.done).length;
            const pct = total ? Math.round(done / total * 100) : 0;
            if (totalBadge) totalBadge.textContent = total;
            if (progressFill) progressFill.style.width = pct + '%';
            if (progressBadge) progressBadge.textContent = pct + '%';
            if (statDone) statDone.textContent = `${done}/${total}`;
        }

        // ============================================================
        // 12. РАБОТА С СОБЫТИЯМИ
        // ============================================================
        function deleteEvent(id) {
            const ev = state.events.find(e => e.id === id);
            askConfirm(`Удалить событие «${ev ? ev.name : ''}»? Это действие нельзя отменить.`, () => {
                state.events = state.events.filter(e => e.id !== id);
                save();
                render();
                toast('Событие удалено', icon('trash'));
            });
        }

        function prevMonth() {
            state.calMonth--;
            if (state.calMonth < 0) { state.calMonth = 11;
                state.calYear--; }
            render();
        }

        function nextMonth() {
            state.calMonth++;
            if (state.calMonth > 11) { state.calMonth = 0;
                state.calYear++; }
            render();
        }

        function openEventModalToday() {
            const now = new Date();
            openEventModal(now.getFullYear(), now.getMonth(), now.getDate());
        }

        function openEventModal(year, month, day) {
            const ds = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            state.pendingEventDate = ds;
            document.getElementById('evDate').value = ds;
            document.getElementById('evName').value = '';
            document.getElementById('evRec').value = 'none';
            state.evColor = '#4f6ef7';
            buildColorPicker();
            document.getElementById('eventModal').classList.add('open');
            document.getElementById('modalTitle').textContent = `${day} ${new Date(year, month, day).toLocaleString('ru-RU', { month: 'long' })}`;
        }

        function buildColorPicker() {
            const c = document.getElementById('evColors');
            if (c) c.innerHTML = COLORS.map(col => `
                <div class="swatch${state.evColor === col ? ' sel' : ''}" style="background:${col}" onclick="pickEvColor('${col}')"></div>`).join('');
        }

        function pickEvColor(col) {
            state.evColor = col;
            buildColorPicker();
        }

        function closeModal() {
            document.getElementById('eventModal').classList.remove('open');
            state.pendingEventDate = null;
        }

        function saveEvent() {
            const name = document.getElementById('evName').value.trim();
            let date = document.getElementById('evDate').value || state.pendingEventDate;
            const rec = document.getElementById('evRec').value;
            const evTime = document.getElementById('evTime').value;
            if (!name) { toast('Введите название события'); return; }
            if (!date) { toast('Пожалуйста, выберите дату'); return; }
            state.events.push({ id: genId(), name, startDate: date, evTime, recurrence: rec, color: state.evColor });
            save();
            closeModal();
            render();
            toast('Событие добавлено', icon('calendar'));
        }

        // ============================================================
        // 13. РАБОТА С БУДИЛЬНИКАМИ
        // ============================================================
        let _editingAlarmId = null;
        let _alarmEditDays = [];
        let _alarmEditSound = { type: 'builtin', id: 'classic' };

        function openAlarmModal(id) {
            _editingAlarmId = id;
            let a;
            if (id) {
                a = state.alarms.find(x => x.id === id);
                if (!a) return;
            } else {
                a = { time: '07:00', label: 'Будильник', vibration: true, days: [0, 1, 2, 3, 4] };
            }
            _alarmEditDays = Array.isArray(a.days) ? [...a.days] : [0, 1, 2, 3, 4, 5, 6];
            _alarmEditSound = a.sound ? { ...a.sound } : { type: 'builtin', id: 'classic' };
            document.getElementById('alarmModalTitle').textContent = id ? 'Изменить будильник' : 'Новый будильник';
            document.getElementById('alEditTime').value = a.time;
            document.getElementById('alEditLabel').value = a.label || '';
            document.getElementById('alEditVibToggle').classList.toggle('on', !!a.vibration);
            renderAlarmPickers();
            document.getElementById('alarmModal').classList.add('open');
        }

        function renderAlarmPickers() {
            // Режимы повторения
            const modesWrap = document.getElementById('alRepeatModes');
            if (modesWrap) {
                let currentMode = 'custom';
                for (const mode of REPEAT_MODES) {
                    if (mode.getDays) {
                        const modeDays = mode.getDays();
                        if (modeDays.length === _alarmEditDays.length && modeDays.every(d => _alarmEditDays.includes(d))) {
                            currentMode = mode.id;
                            break;
                        }
                    }
                }
                modesWrap.innerHTML = REPEAT_MODES.map(mode => `
                    <div class="s-pill${currentMode === mode.id ? ' active' : ''}" onclick="setRepeatMode('${mode.id}')">${mode.label}</div>
                `).join('');
            }

            // Дни недели
            const daysWrap = document.getElementById('alEditDays');
            if (daysWrap) {
                daysWrap.innerHTML = WEEKDAYS.map((d, i) => `
                    <div class="wd-pill${_alarmEditDays.includes(i) ? ' active' : ''}" onclick="toggleAlarmDay(${i})">${d}</div>
                `).join('');
            }

            renderSoundPills();
        }

        function renderSoundPills() {
            const wrap = document.getElementById('alSoundPills');
            if (wrap) {
                wrap.innerHTML = ALARM_SOUNDS.map(s => `
                    <div class="sound-pill${_alarmEditSound.type === 'builtin' && _alarmEditSound.id === s.id ? ' active' : ''}" onclick="selectBuiltinSound('${s.id}')">
                        <button type="button" class="sound-preview-btn" onclick="event.stopPropagation();previewSound({type:'builtin',id:'${s.id}'})">${icon('play', 'icon-fill')}</button>
                        ${s.label}
                    </div>`).join('');
            }
            const customInfo = document.getElementById('alCustomSoundInfo');
            if (customInfo) {
                if (_alarmEditSound.type === 'custom') {
                    customInfo.style.display = 'flex';
                    customInfo.innerHTML = `<span>${icon('check')} ${esc(_alarmEditSound.name || 'Свой файл')}</span>
                        <button type="button" class="btn-icon danger" onclick="removeCustomSound()">${icon('trash')}</button>`;
                } else {
                    customInfo.style.display = 'none';
                    customInfo.innerHTML = '';
                }
            }
        }

        function selectBuiltinSound(id) {
            _alarmEditSound = { type: 'builtin', id };
            renderSoundPills();
            previewSound(_alarmEditSound);
        }

        function handleCustomSoundUpload(file) {
            if (!file) return;
            if (!file.type.startsWith('audio/')) { toast('Выберите аудиофайл'); return; }
            if (file.size > 3 * 1024 * 1024) { toast('Файл слишком большой (макс. 3 МБ)'); return; }
            const reader = new FileReader();
            reader.onload = e => {
                _alarmEditSound = { type: 'custom', name: file.name, dataUrl: e.target.result };
                renderSoundPills();
                previewSound(_alarmEditSound);
                toast('Звук загружен', icon('check'));
            };
            reader.onerror = () => toast('Не удалось прочитать файл', icon('alert'));
            reader.readAsDataURL(file);
        }

        function removeCustomSound() {
            _alarmEditSound = { type: 'builtin', id: 'classic' };
            renderSoundPills();
        }

        function setRepeatMode(modeId) {
            const mode = REPEAT_MODES.find(m => m.id === modeId);
            if (mode && mode.getDays) {
                _alarmEditDays = mode.getDays();
                renderAlarmPickers();
            }
        }

        function toggleAlarmDay(i) {
            if (_alarmEditDays.includes(i)) {
                _alarmEditDays = _alarmEditDays.filter(d => d !== i);
            } else {
                _alarmEditDays.push(i);
            }
            _alarmEditDays.sort((a, b) => a - b);
            renderAlarmPickers();
        }

        function closeAlarmModal() {
            document.getElementById('alarmModal').classList.remove('open');
            _editingAlarmId = null;
        }

        function saveAlarmFromModal() {
            const time = document.getElementById('alEditTime').value || '07:00';
            const label = document.getElementById('alEditLabel').value.trim() || 'Будильник';
            const vibration = document.getElementById('alEditVibToggle').classList.contains('on');
            const days = [..._alarmEditDays];
            const sound = { ..._alarmEditSound };

            if (days.length === 0) { toast('Выберите хотя бы один день'); return; }

            if (_editingAlarmId) {
                const a = state.alarms.find(a => a.id === _editingAlarmId);
                if (a) { a.time = time;
                    a.label = label;
                    a.vibration = vibration;
                    a.days = days;
                    a.sound = sound; }
            } else {
                state.alarms.push({ id: genId(), time, label, vibration, days, sound, on: true });
            }
            save();
            closeAlarmModal();
            render();
            toast('Будильник сохранён!', icon('bell'));
        }

        function toggleAlarmOn(id) {
            const a = state.alarms.find(a => a.id === id);
            if (a) {
                a.on = !a.on;
                save();
                render();
                toast(a.on ? 'Будильник включён' : 'Будильник выключен', icon(a.on ? 'bell' : 'bellOff'));
            }
        }

        function deleteAlarm(id) {
            const a = state.alarms.find(a => a.id === id);
            askConfirm(`Удалить будильник «${a ? a.label : ''}» (${a ? a.time : ''})? Это действие нельзя отменить.`, () => {
                state.alarms = state.alarms.filter(a => a.id !== id);
                save();
                render();
                toast('Будильник удалён', icon('trash'));
            });
        }

        // ============================================================
        // 14. ПРОВЕРКА БУДИЛЬНИКОВ
        // ============================================================
        let _ringingAlarmId = null;

        function checkAlarms() {
            const now = new Date();
            const t = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            const todayDow = (now.getDay() + 6) % 7; // 0=Mon..6=Sun
            const fireKey = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()} ${t}`;

            state.alarms.forEach(a => {
                // Отложенный будильник — звонит повторно по истечении снуза, независимо от текущего времени
                if (a.snoozedUntil && Date.now() >= a.snoozedUntil) {
                    a.snoozedUntil = null;
                    save();
                    triggerAlarm(a);
                    return;
                }
                if (!a.on || a.time !== t) return;
                if (a.days && a.days.length && !a.days.includes(todayDow)) return;
                if (a.lastFired === fireKey) return; // уже сработал в эту минуту — не дублируем
                a.lastFired = fireKey;
                save();
                triggerAlarm(a);
            });
        }

        function triggerAlarm(a) {
            _ringingAlarmId = a.id;
            const timeEl = document.getElementById('ringTime');
            const labelEl = document.getElementById('ringLabel');
            if (timeEl) timeEl.textContent = a.time;
            if (labelEl) labelEl.textContent = a.label || 'Будильник';
            document.getElementById('ringOverlay').classList.add('open');
            startRinging(a);

            if ('serviceWorker' in navigator && navigator.serviceWorker.controller && Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => reg.showNotification(a.label || 'Будильник', {
                    body: `Время: ${a.time}`,
                    tag: 'flowday-alarm',
                    requireInteraction: true,
                    actions: [{ action: 'snooze', title: 'Отложить' }, { action: 'stop', title: 'Остановить' }],
                })).catch(() => {});
            } else if (Notification.permission === 'granted') {
                try { new Notification(a.label || 'Будильник', { body: `Время: ${a.time}`, tag: 'flowday-alarm' }); } catch (e) {}
            }
        }

        function dismissAlarm() {
            stopRinging();
            document.getElementById('ringOverlay').classList.remove('open');
            _ringingAlarmId = null;
        }

        function snoozeAlarm() {
            const a = state.alarms.find(x => x.id === _ringingAlarmId);
            stopRinging();
            document.getElementById('ringOverlay').classList.remove('open');
            if (a) {
                a.snoozedUntil = Date.now() + 5 * 60 * 1000;
                save();
                toast('Отложено на 5 минут', icon('bell'));
            }
            _ringingAlarmId = null;
        }

        // ============================================================
        // 15. ПОДТВЕРЖДЕНИЕ ДЕЙСТВИЙ
        // ============================================================
        let _confirmAction = null;

        function askConfirm(desc, onYes) {
            document.getElementById('confirmDesc').textContent = desc;
            _confirmAction = onYes;
            const yesBtn = document.getElementById('confirmYesBtn');
            yesBtn.onclick = () => {
                const action = _confirmAction;
                closeConfirm();
                if (action) action();
            };
            document.getElementById('confirmModal').classList.add('open');
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('open');
            _confirmAction = null;
        }

        // ============================================================
        // 16. НАСТРОЙКИ
        // ============================================================
        function updateName(v) {
            if (v.trim()) state.userName = v.trim();
            else state.userName = '';
            save();
        }

        function reqNotifs() {
            Notification.requestPermission().then(p => toast(p === 'granted' ? 'Уведомления включены!' : 'Разрешение не получено', p ===
                'granted' ? icon('bell') : icon('bellOff')));
        }

        function clearData() {
            askConfirm('Удалить все задачи, события и будильники? Это действие нельзя отменить.', () => {
                state.tasks = [];
                state.events = [];
                state.alarms = [];
                save();
                render();
                toast('Данные очищены');
            });
        }

        // ============================================================
        // 17. БЭКАП
        // ============================================================
        function exportBackup() {
            const payload = {
                exportedAt: new Date().toISOString(),
                userName: state.userName,
                dark: state.dark,
                color: state.color,
                tasks: state.tasks,
                events: state.events,
                alarms: state.alarms,
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const dateStr = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = `flowday-backup-${dateStr}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            toast('Бэкап скачан', icon('download'));
        }

        function importBackup(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    askConfirm('Восстановить данные из бэкапа? Текущие данные будут заменены.', () => {
                        if (data.userName !== undefined) state.userName = data.userName;
                        if (data.dark !== undefined) state.dark = data.dark;
                        if (data.color) state.color = data.color;
                        if (data.tasks) state.tasks = data.tasks;
                        if (data.events) state.events = data.events;
                        if (data.alarms) state.alarms = data.alarms;
                        applyTheme();
                        save();
                        render();
                        toast('Данные восстановлены из бэкапа', icon('check'));
                    });
                } catch (err) {
                    toast('Файл повреждён или имеет неверный формат', icon('alert'));
                }
            };
            reader.readAsText(file);
        }

        // ============================================================
        // 18. ЦИТАТЫ
        // ============================================================
        function newQuote() {
            const q = document.getElementById('quoteBox');
            q.style.display = 'flex';
            q.innerHTML = icon('sparkle') + '<span>' + esc(QUOTES[Math.floor(Math.random() * QUOTES.length)]) + '</span>';
        }

        function refreshQuote() {
            const q = document.getElementById('randomQuote');
            if (q) q.innerHTML = icon('sparkle') + '<span>' + esc(QUOTES[Math.floor(Math.random() * QUOTES.length)]) +
            '</span>';
        }

        // ============================================================
        // 19. ПРИВЯЗКА СОБЫТИЙ
        // ============================================================
        let _modalBound = false;

        function bindEvents() {
            if (!_modalBound) {
                document.getElementById('modalCancel')?.addEventListener('click', closeModal);
                document.getElementById('modalSave')?.addEventListener('click', saveEvent);
                document.getElementById('eventModal')?.addEventListener('click', e => { if (e.target.classList.contains(
                        'modal-overlay')) closeModal(); });
                document.getElementById('confirmModal')?.addEventListener('click', e => { if (e.target.classList.contains(
                        'modal-overlay')) closeConfirm(); });
                document.getElementById('editTaskModal')?.addEventListener('click', e => { if (e.target.classList.contains(
                        'modal-overlay')) closeEditTask(); });
                document.getElementById('alarmModal')?.addEventListener('click', e => { if (e.target.classList.contains(
                        'modal-overlay')) closeAlarmModal(); });
                document.getElementById('alarmModalCancel')?.addEventListener('click', closeAlarmModal);
                document.getElementById('alarmModalSave')?.addEventListener('click', saveAlarmFromModal);
                document.getElementById('evDate')?.addEventListener('change', e => { state.pendingEventDate = e.target
                        .value; });
                document.getElementById('editTaskInput')?.addEventListener('keydown', e => { if (e.key === 'Enter')
                        saveEditTask(); });
                _modalBound = true;
            }
            buildColorPicker();
        }

        // ============================================================
        // 20. ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        load();
        goTo('today');

        // Проверка будильников каждую секунду (для точного срабатывания и отложенных будильников)
        setInterval(checkAlarms, 1000);
        if (Notification.permission === 'default') Notification.requestPermission();

        // Звук по умолчанию заблокирован браузером до первого взаимодействия —
        // «прогреваем» AudioContext при первом тапе/клике по странице
        const _unlockAudio = () => { try { getAudioCtx(); } catch (e) {}
            document.removeEventListener('click', _unlockAudio);
            document.removeEventListener('touchstart', _unlockAudio); };
        document.addEventListener('click', _unlockAudio);
        document.addEventListener('touchstart', _unlockAudio);

        // Если вкладка снова стала активной — сразу проверяем будильники
        document.addEventListener('visibilitychange', () => { if (!document.hidden) checkAlarms(); });

        // Service worker — нужен, чтобы уведомление о будильнике могло показывать
        // кнопки «Отложить» / «Остановить» прямо в уведомлении ОС.
        // ВАЖНО: это не позволяет будильнику звонить при закрытой вкладке —
        // браузеры не дают сайтам «просыпаться» в фоне без отдельного push-сервера.
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
            navigator.serviceWorker.addEventListener('message', e => {
                if (e.data && e.data.type === 'alarm-action') {
                    if (e.data.action === 'snooze') snoozeAlarm();
                    else dismissAlarm();
                }
            });
        }

        // Автоопределение темы
        if (!localStorage.getItem('flowday')) {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) {
                state.dark = true;
                applyTheme();
            }
        }

        console.log('🌊 FlowDay загружен! Приятного дня!');
    </script>
</body>
</html>
